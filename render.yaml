services:
  - type: web
    name: oss-backend
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: OSS Catalog API
